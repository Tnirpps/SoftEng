components_manager:
    task_processors:
        main-task-processor:
            worker_threads: $worker-threads
        fs-task-processor:
            worker_threads: $worker-fs-threads
    default_task_processor: main-task-processor

    components:
        server:
            listener:
                port: $server-port
                task_processor: main-task-processor
        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: $logger-level
                    overflow_behavior: discard
        default-secdist-provider:
            config: $secdist-path
            missing-ok: true
            environment-secrets-key: SECDIST_CONFIG
        dynamic-config: {}
        testsuite-support: {}

        http-client:
        http-client-core:
            load-enabled: $is_testing
            fs-task-processor: fs-task-processor

        dns-client:
            fs-task-processor: fs-task-processor

        mongo-files:
            dbconnection: $mongo-connection

        directory-cache:
            groups:
              - config_name: directory-cache
                db: directory-cache
            subscribe_groups: []
            thread_pools:
                redis_thread_pool_size: 8
                sentinel_thread_pool_size: 1

        events-rabbit:
            secdist_alias: events-rabbit
            min_pool_size: 2
            max_pool_size: 8
            max_in_flight_requests: 8
            use_secure_connection: false

        tests-control:
            load-enabled: $is-testing
            path: /tests/{action}
            method: POST
            task_processor: main-task-processor

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        handler-file-create:
            path: /v1/files
            method: POST
            task_processor: main-task-processor
            max_requests_per_second: $file-write-rps
            middlewares:
                pipeline-builder: protected-handler-pipeline-builder

        handler-file-get:
            path: /v1/files/{file_id}
            method: GET
            task_processor: main-task-processor
            middlewares:
                pipeline-builder: protected-handler-pipeline-builder

        handler-file-update:
            path: /v1/files/{file_id}
            method: PUT
            task_processor: main-task-processor
            max_requests_per_second: $file-write-rps
            middlewares:
                pipeline-builder: protected-handler-pipeline-builder

        handler-file-delete:
            path: /v1/files/{file_id}
            method: DELETE
            task_processor: main-task-processor
            max_requests_per_second: $file-write-rps
            middlewares:
                pipeline-builder: protected-handler-pipeline-builder

        file-repository: {}

        file-response-cache:
            file-ttl-seconds: $file-cache-ttl-seconds

        file-event-publisher:
            rabbit_name: events-rabbit

        jwt-credentials:
            # Store secret in configs instead of env
            # just for the sake of simplicity
            secret: super-secret-jwt-key
            issuer: user-service

        auth-middleware: {}

        protected-handler-pipeline-builder: {}
